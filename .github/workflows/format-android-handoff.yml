name: Format Android Handoff

on:
  push:
    branches:
      - android-blackbox-handoff
    paths:
      - ".github/workflows/format-android-handoff.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: android-blackbox-handoff

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          package-manager-cache: false

      - name: Install dependencies
        run: make init

      - name: Format handoff files
        run: |
          pnpm exec prettier --write \
            .github/workflows/android-blackbox-handoff.yml \
            .github/workflows/format-android-handoff.yml \
            cordova/config_template.xml \
            cordova/plugins/cordova-plugin-rotorflight-blackbox-intent/plugin.xml \
            cordova/plugins/cordova-plugin-rotorflight-blackbox-intent/www/blackboxIntent.js \
            cordova/plugins/cordova-plugin-rotorflight-blackbox-intent/src/android/blackbox_file_paths.xml \
            src/js/android_blackbox_handoff.js \
            src/js/filesystem.js \
            src/js/main.svelte.js \
            src/tabs/blackbox.html

      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Apply Prettier formatting"
          git push origin HEAD:android-blackbox-handoff
