name: Android Blackbox Handoff

on:
  workflow_dispatch:
  push:
    branches:
      - android-blackbox-handoff
  pull_request:
    paths:
      - "cordova/**"
      - "src/js/android_blackbox_handoff.js"
      - "src/js/filesystem.js"
      - "src/js/main.svelte.js"
      - "src/tabs/blackbox.html"
      - ".github/workflows/android-blackbox-handoff.yml"

permissions:
  contents: read

jobs:
  build-android-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          package-manager-cache: false

      - name: Install Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          cmdline-tools-version: 13114758
          packages: "tools platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Give handoff test a separate Android identity
        shell: python
        run: |
          from pathlib import Path

          path = Path("cordova/config_template.xml")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              'id="org.rotorflight.rotorflightconfigurator"',
              'id="org.rotorflight.rotorflightconfigurator.handofftest"',
          )
          text = text.replace(
              '<name>{{name}}</name>',
              '<name>{{name}} Handoff Test</name>',
          )
          path.write_text(text, encoding="utf-8")

      - name: Set Android test version
        run: make version SEMVER=0.1.0

      - name: Initialise build environment
        run: make init

      - name: Build Android debug APK
        shell: bash
        run: |
          set -o pipefail
          pnpm gulp app --platform android --debug 2>&1 | tee android-configurator-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rotorflight-configurator-android-handoff-build-log
          path: android-configurator-build.log
          if-no-files-found: error

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: rotorflight-configurator-android-handoff-debug
          path: app/android/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
